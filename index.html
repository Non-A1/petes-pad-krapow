<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pete's Pad Krapow | Interactive Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>
</head>
<body>

    <div id="door-container">
        <div class="storefront-bg"></div> 
        <div class="door-overlay">
            <h1 class="glow-text">Pete's Pad Krapow</h1>
            <button id="enter-btn">ENTER RESTAURANT</button>
        </div>
    </div>

    <div id="video-container" class="hidden">
        <video id="reveal-video" width="100%" playsinline>
            <source src="videos/thai-beach-reveal.mp4" type="video/mp4">
        </video>
    </div>

    <section id="menu" class="hidden">
        <div id="camera-preview">
            <video id="webcam" autoplay playsinline></video>
            <div id="virtual-cursor"></div>
        </div>

        <div class="menu-card">
            <h2 class="menu-title">Chef Pete's Signature Menu</h2>
            <p class="menu-subtitle">Hover your finger over a dish to select</p>
            
            <div class="options">
                <button class="menu-opt" data-val="chicken">
                    <span class="dish-label">Chicken Pad Krapow</span>
                </button>
                <button class="menu-opt" data-val="pork">
                    <span class="dish-label">Pork Pad Krapow</span>
                </button>
                <button class="menu-opt" data-val="beef">
                    <span class="dish-label">Beef Pad Krapow</span>
                </button>
                <button class="menu-opt" data-val="tofu">
                    <span class="dish-label">Tofu Pad Krapow</span>
                </button>
            </div>

            <div id="display-area" class="hidden">
                <img id="dish-image" src="" alt="Selected Thai Dish">
                <h3 id="selected-dish-title" class="glow-text"></h3>
                <p id="dish-desc"></p>
            </div>
        </div>
    </section>

    <audio id="bg-music" loop>
        <source src="audio/thai-ambient.mp3" type="audio/mpeg">
    </audio>

    <script type="module" src="script.js"></script>
</body>
</html>
