<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pete's Pad Krapow | Gesture Control</title>
    <link rel="stylesheet" href="style.css">
    <!-- MediaPipe Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- Gesture Cursor -->
    <div id="gesture-cursor"></div>

    <!-- Camera Feed (Hidden) -->
    <video id="input-video" class="hidden"></video>

    <!-- STAGE 1: THE BAMBOO DOORS -->
    <div id="door-container" class="active-stage">
        <div class="door left-door"></div>
        <div class="door right-door"></div>
        <div class="door-overlay">
            <h1>Welcome to Thailand</h1>
            <p>Hover over the button to enter</p>
            <button id="enter-btn" class="interactable">ENTER RESTAURANT</button>
        </div>
    </div>

    <!-- STAGE 2: VIDEO INTRO -->
    <div id="video-container" class="hidden">
        <video id="chef-video" width="100%">
            <source src="videos/chef-pete-intro.mp4" type="video/mp4">
        </video>
    </div>

    <!-- STAGE 3: THE INTERACTIVE MENU -->
    <section id="menu" class="hidden">
        <div class="menu-card">
            <h2>Pete's Selection</h2>
            
            <div class="menu-row">
                <div class="selection-column">
                    <h3>1. Protein</h3>
                    <div class="options">
                        <button class="menu-opt interactable" data-type="protein" data-val="chicken">Chicken</button>
                        <button class="menu-opt interactable" data-type="protein" data-val="pork">Pork</button>
                        <button class="menu-opt interactable" data-type="protein" data-val="beef">Beef</button>
                        <button class="menu-opt interactable" data-type="protein" data-val="tofu">Tofu</button>
                    </div>
                </div>

                <div class="selection-column">
                    <h3>2. Spice Level</h3>
                    <div class="options">
                        <button class="menu-opt interactable spice-btn" data-type="spice" data-chilis="1">Lvl 1 - Wok n' the Park</button>
                        <button class="menu-opt interactable spice-btn" data-type="spice" data-chilis="5">Lvl 2 - Wok n' Roll</button>
                        <button class="menu-opt interactable spice-btn" data-type="spice" data-chilis="10">Lvl 3 - Wok in da Hell</button>
                        <button class="menu-opt interactable spice-btn" data-type="spice" data-chilis="30">Lvl 4 - Wok da Fok</button>
                    </div>
                </div>
            </div>

            <div id="dish-preview-area">
                <div id="chili-container"></div> <!-- Chili animations happen here -->
                <img id="dish-image" src="" alt="">
                <h3 id="order-confirm"></h3>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
