<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pete's Pad Krapow | Interactive Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>
</head>
<body>

    <div id="door-container">
        <div class="storefront-bg"></div> 
        <div class="door-overlay">
            <h1 class="glow-text">Pete's Pad Krapow</h1>
            <button id="enter-btn">ENTER RESTAURANT</button>
        </div>
    </div>

    <div id="video-container" class="hidden">
        <video id="main-video" width="100%" playsinline>
            <source src="videos/thai-beach-reveal.mp4" type="video/mp4">
        </video>
    </div>

    <section id="menu" class="hidden">
        <div id="camera-preview">
            <video id="webcam" autoplay playsinline></video>
            <div id="virtual-cursor"></div>
        </div>

        <div class="desktop-menu-layout">
            <div class="menu-graphic-side">
                <img src="images/petes-pad-krapow-menu.png" id="menu-base" alt="Pete's Pad Krapow Menu">
                
                <ul id="dish-list">
                    <li class="menu-opt" id="opt-chicken" data-val="chicken">Chicken Pad Krapow</li>
                    <li class="menu-opt" id="opt-pork" data-val="pork">Pork Pad Krapow</li>
                    <li class="menu-opt" id="opt-beef" data-val="beef">Beef Pad Krapow</li>
                    <li class="menu-opt" id="opt-tofu" data-val="tofu">Tofu Pad Krapow</li>
                </ul>
            </div>

            <div id="image-display-container">
                <div id="status-message">Select a dish to view your selection</div>
            </div>
        </div>
    </section>

    <audio id="bg-music" loop><source src="audio/thai-ambient.mp3" type="audio/mpeg"></audio>
    <script type="module" src="script.js"></script>
</body>
</html>
