<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pete's Pad Krapow | Interactive Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>
</head>
<body>

    <div id="door-container">
        <div class="storefront-bg"></div> 
        <div class="door-overlay">
            <h1 class="glow-text">Pete's Pad Krapow</h1>
            <button id="enter-btn">ENTER RESTAURANT</button>
        </div>
    </div>

    <div id="video-container" class="hidden">
        <video id="reveal-video" width="100%" playsinline>
            <source src="videos/thai-beach-reveal.mp4" type="video/mp4">
        </video>
    </div>

    <section id="menu" class="hidden">
        <div id="camera-preview">
            <video id="webcam" autoplay playsinline></video>
            <div id="virtual-cursor"></div>
        </div>

        <div class="menu-card">
            <img src="images/petes-pad-krapow-menu.png" id="main-menu-graphic" alt="Pete's Menu">
            
            <div class="options-overlay">
                <button class="menu-opt" data-val="chicken">Chicken</button>
                <button class="menu-opt" data-val="pork">Pork</button>
                <button class="menu-opt" data-val="beef">Beef</button>
                <button class="menu-opt" data-val="tofu">Tofu</button>
            </div>

            <div id="display-area" class="hidden">
                <div class="dish-reveal-card">
                    <img id="dish-image" src="" alt="Dish Preview">
                    <h2 id="selected-dish-title" class="glow-text"></h2>
                    <p id="dish-desc"></p>
                    <button onclick="document.getElementById('display-area').classList.add('hidden')">Close</button>
                </div>
            </div>
        </div>
    </section>

    <audio id="bg-music" loop>
        <source src="audio/thai-ambient.mp3" type="audio/mpeg">
    </audio>

    <script type="module" src="script.js"></script>
</body>
</html>
